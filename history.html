<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Voting System - Voting History</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        .history-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 30px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 5px solid #2ecc71;
            transition: transform 0.2s;
        }
        .history-card:hover { transform: translateX(5px); }
        .history-details h3 { margin: 0 0 5px 0; color: #333; font-size: 1.3em; }
        .history-details p { margin: 0; color: #666; font-size: 0.9em; font-weight: 500; }
        .history-meta {
            text-align: right;
            color: #888;
            font-size: 0.85em;
        }
        .history-meta .badge {
            display: inline-block;
            background: #e8f8f5;
            color: #2ecc71;
            padding: 5px 10px;
            border-radius: 15px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        @media (max-width: 600px) {
            .history-card { flex-direction: column; align-items: flex-start; gap: 15px; }
            .history-meta { text-align: left; }
        }
        .vote-button{
            background-color: #0055a4;
            cursor: pointer;
        }
        .vote-button:hover{
            background-color: #033a66;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <span class="portal-name">SIMPLE VOTING PORTAL</span>
        </div>
        <div class="header-right">
            <a href="dashboard.html" class="nav-button" style="text-decoration:none;">DASHBOARD</a>
            <a href="candidates.html" class="nav-button" style="text-decoration:none;">CANDIDATES</a>
            <a href="results.html" class="nav-button" style="text-decoration:none;">RESULTS</a>
            
            <div class="profile-dropdown">
                <button class="profile-icon">
                    <img src="https://ui-avatars.com/api/?name=Voters+Name&background=e74c3c&color=fff" alt="Profile">
                </button>
                <div class="dropdown-content">
                    <a href="myprofile.html"> My Profile</a>
                    <a href="history.html" style="font-weight:bold; color:#0055a4;">Voting History</a>
                    <a href="Login.html" style="color: #e74c3c;"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </div>
            </div>
        </div>
    </div>

    <div class="container" style="max-width: 800px;">
        <div class="section-title" style="margin-top: 30px; margin-bottom: 20px; border-bottom: 3px solid #0055a4; padding-bottom: 15px;">
            <i class="fas fa-history" style="color:#0055a4;"></i> My Voting History
        </div>
        <p style="color: #555; font-size: 1.1em; margin-bottom: 30px;">This page securely logs all the votes you have cast in the current election.</p>
        
        <div id="historyContainer">
        </div>
        
        <div style="margin-top: 40px; text-align: center;">
            <a href="candidates.html" class="vote-button" style="display:inline-block; text-decoration:none; padding: 10px 20px; width:auto;">Back to Ballot</a>
        </div>
    </div>
    
    <footer class="footer">
        <p>&copy; 2026 Simple Voting System. All rights reserved.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Check global profile photo
            const savedPhoto = localStorage.getItem('myProfilePhoto');
            if (savedPhoto) {
                document.querySelectorAll('.profile-icon img').forEach(img => {
                    img.src = savedPhoto;
                    img.style.objectFit = 'cover';
                });
            }

            const container = document.getElementById('historyContainer');
            const history = JSON.parse(localStorage.getItem('myVotingHistory') || '[]');
            
            if (history.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; padding: 50px; background: #fff; border-radius:12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
                        <i class="fas fa-inbox" style="font-size: 3em; color: #bdc3c7; margin-bottom: 20px;"></i>
                        <h3 style="color: #333;">No Voting History</h3>
                        <p style="color: #666;">You haven't cast any votes yet.</p>
                    </div>
                `;
                return;
            }
            
            // Sort by timestamp descending
            history.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            
            let html = '';
            history.forEach(item => {
                html += `
                    <div class="history-card">
                        <div class="history-details" style="display:flex; align-items:center; gap: 20px;">
                            <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(item.name)}&background=random" style="width: 60px; height: 60px; border-radius: 50%;">
                            <div>
                                <h3>${item.name}</h3>
                                <p>${item.position} &bull; ${item.party}</p>
                            </div>
                        </div>
                        <div class="history-meta">
                            <div class="badge"><i class="fas fa-check-circle"></i> VOTE COUNTED</div>
                            <div style="margin-top:5px;"><i class="far fa-clock"></i> ${item.timestamp}</div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        });
    </script>
</body>
</html>
