<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Voting System - My Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        .profile-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 600px;
            margin: 40px auto;
            overflow: hidden;
        }
        .profile-header-bg {
            background: linear-gradient(135deg, #0055a4 0%, #003366 100%);
            height: 80px;
            width: 100%;
        }
        .profile-avatar-wrapper {
            text-align: center;
            margin-top: -60px;
        }
        .profile-avatar-wrapper img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .profile-details {
            padding: 20px 40px 40px;
            text-align: center;
        }
        .profile-name {
            font-size: 1.8em;
            color: #333;
            margin: 10px 0 5px;
        }
        .profile-status {
            display: inline-block;
            background: #2ecc71;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            text-align: left;
            margin-top: 20px;
        }
        .info-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #0055a4;
        }
        .info-label {
            display: block;
            font-size: 0.8em;
            color: #777;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .info-value {
            font-size: 1.1em;
            color: #333;
            font-weight: 600;
        }
        .vote-button{
            background-color: #0055a4;
            cursor: pointer;
        }
        .vote-button:hover{
            background-color: #033a66;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <span class="portal-name">Simple Voting System</span>
        </div>
        <div class="header-right">
            <a href="dashboard.html" class="nav-button" style="text-decoration:none;">DASHBOARD</a>
            <a href="candidates.html" class="nav-button" style="text-decoration:none;">CANDIDATES</a>
            <a href="results.html" class="nav-button" style="text-decoration:none;">RESULTS</a>
            
            <div class="profile-dropdown">
                <button class="profile-icon">
                    <img src="https://ui-avatars.com/api/?name=Voters+Name&background=e74c3c&color=fff" alt="Profile">
                </button>
                <div class="dropdown-content">
                    <a href="myprofile.html" style="font-weight:bold; color:#0055a4;">Profile</a>
                    <a href="history.html">Voting History</a>
                    <a href="Login.html" style="color: #e74c3c;"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="profile-card">
            <div class="profile-header-bg"></div>
            <div class="profile-avatar-wrapper">
                <img src="https://ui-avatars.com/api/?name=Voters+Name&background=e74c3c&color=fff&size=200" alt="Voters Name">
            </div>
            <div class="profile-details">
                <h2 class="profile-name">Voters Name</h2>
                <div class="profile-status">Registered Voter</div>
                
                <div class="info-grid">
                    <div class="info-item">
                        <span class="info-label">Student Number</span>
                        <span class="info-value">2023-10485</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">College</span>
                        <span class="info-value">College of Engineering</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Course</span>
                        <span class="info-value">BS Computer Science</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Year Level</span>
                        <span class="info-value">3rd Year</span>
                    </div>
                </div>
                
                <div style="margin-top: 30px;">
                    <a href="dashboard.html" class="vote-button" style=" text-decoration:none; padding: 10px 20px; width:auto;"> Back to Dashboard</a>
                </div>
            </div>
        </div>
    </div>
    
    <footer class="footer">
        <p>&copy; 2026 Simple Voting System. All rights reserved.</p>
    </footer>
</body>
</html>
