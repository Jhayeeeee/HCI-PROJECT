<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Login.css">
    <title>PLM LOGIN</title>
</head>
<body>
    
    <div class="background-container">
        <div class="login-container">
            <img src="PICTURES/PLM-LOGO.webp" alt="PLM LOGO" class="PLM-LOGO">
            <h2>Student Council Voting Portal</h2>
            <p>Please enter your credentials to vote.</p>
            
            <div class="input-box">
                <input type="text" id="email" placeholder="example@edu.plm.ph">
            </div>
            <div class="input-box">
                <input type="password" id="password" placeholder="Password">
            </div>
            <button type="button" class="login-button">Login</button>
            <div class="button-separator"><span>OR</span></div>
            <button type="button" class="microsoft-button">Sign in With Microsoft Account</button>
    </div>
</body>
</html>
