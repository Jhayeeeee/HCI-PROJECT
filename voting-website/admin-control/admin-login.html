<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="../css/Login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', Arial, sans-serif; }
        .login-container { text-align: center; } /* ensuring center alignment */
        .admin-badge {
            background-color: #e74c3c;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }
        .login-button { cursor: pointer; }
    </style>
</head>
<body>
    <div class="background-container">
        <div class="login-container">
            <h2>Election Control Panel</h2>
            <p>Please enter your administrator credentials.</p>
            
            <form id="adminLoginForm">
                <div class="input-box">
                    <input type="text" id="adminUsername" placeholder="Admin Username (admin)" required>
                </div>
                <div class="input-box">
                    <input type="password" id="adminPassword" placeholder="Admin Password (admin123)" required>
                </div>
                <button type="submit" class="login-button">Login to Control Panel</button>
            </form>
            <h4 id="loginMessage" class="error-message" style="color: #e74c3c; margin-top: 15px;"></h4>
            
            <div style="margin-top: 25px;">
                <a href="../Login.html" style="color: #0055a4; text-decoration: none; font-size: 0.9em; font-weight: 600;">&larr; Back to Voter Login</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('adminUsername').value;
            const pass = document.getElementById('adminPassword').value;
            const msg = document.getElementById('loginMessage');
            
            // Hardcoded admin credentials for prototype (admin / admin123)
            if (user === 'admin' && pass === 'admin123') {
                localStorage.setItem('isAdminLoggedIn', 'true');
                window.location.href = 'admin.html';
            } else {
                msg.textContent = 'Invalid administrator credentials.';
            }
        });
    </script>
</body>
</html>
