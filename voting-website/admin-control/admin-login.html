<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="../css/Login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">

</head>
<body>
    <div class="background-container">
        <div class="login-container">
            <h2>Election Control Panel</h2>
            <p>Please enter your administrator credentials.</p>
            
            <form id="adminLoginForm">
                <div class="input-box">
                    <input type="text" id="adminUsername" placeholder="Admin Username (admin)" required>
                </div>
                <div class="input-box">
                    <input type="password" id="adminPassword" placeholder="Admin Password (admin123)" required>
                </div>
                <button type="submit" class="login-button">Login to Control Panel</button>
            </form>
            <h4 id="loginMessage" class="error-message admin-error"></h4>
            
            <div class="mt-25">
                <a href="../mainpage.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Mainpage</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('adminUsername').value;
            const pass = document.getElementById('adminPassword').value;
            const msg = document.getElementById('loginMessage');
            
            // Hardcoded admin credentials for prototype (admin / admin123)
            if (user === 'admin' && pass === 'admin123') {
                localStorage.setItem('isAdminLoggedIn', 'true');
                window.location.href = 'admin.html';
            } else {
                msg.textContent = 'Invalid administrator credentials.';
            }
        });
    </script>
</body>
</html>
