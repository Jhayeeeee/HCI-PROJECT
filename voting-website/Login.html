<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Voting System -Login</title>
    <link rel="stylesheet" href="css/Login.css">
</head>
<body>
    <div class="background-container">
        <div class="login-container">
            <h2>Simple Voting System</h2>
            <p>Please enter your credentials to vote.</p>
            
            <form id="loginForm" onsubmit="validateLogin()">
            <div class="input-box">
                <input type="text" id="username" placeholder="Username" required>
            </div>
            <div class="input-box">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button type="button" class="login-button" onclick="validateLogin()">Login</button>
            <div class="button-separator"><span>OR</span></div>
            
            <button type="button" class="microsoft-button" onclick="loginWithMicrosoft()">Sign in with Microsoft Account</button>
            </form>
            <h4 id="message" class="error-message"></h4>
    </div>
</div>
<script src="js/Login.js"></script>
</body>
</html>
