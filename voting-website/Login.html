<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Login -Student Voting Portal</title>
    <link rel="stylesheet" href="css/Login.css">
</head>
<body>
    <div class="background-container">
        <div class="login-container">
            <h2>Student Voting Portal</h2>
            <p>Please enter your credentials to vote.</p>
            

            
            <form id="loginForm" onsubmit="validateLogin()">
            <div class="input-box">
                <input type="text" id="email" placeholder="Email" required>
            </div>
            <div class="input-box password-container">
                <input type="password" id="password" placeholder="Password" required>
                <i class="fa-solid fa-eye" id="togglePassword" onclick="togglePasswordVisibility()"></i>
            </div>
            <button type="button" class="login-button" onclick="validateLogin()">Login</button>
            <div class="button-separator"><span>OR</span></div>
            
            <button type="button" class="microsoft-button" onclick="loginWithMicrosoft()">Sign in with Microsoft Account</button>
            </form>
            <h4 id="message" class="error-message"></h4>

            <div class="mt-25">
                <a href="mainpage.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Mainpage</a>
            </div>
    </div>
</div>
<script src="js/Login.js"></script>
</body>
</html>
