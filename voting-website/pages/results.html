    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Results - Student Voting Portal</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="stylesheet" href="../css/dashboard.css">
    </head>
    <body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="portal-name" style="color:white; font-size: 20px;">Student Voting Portal</span>
                <button class="close-btn" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="sidebar-user">
                <img src="https://ui-avatars.com/api/?name=Voters+Name&background=e74c3c&color=fff" alt="Profile" class="sidebar-avatar">
                <div class="sidebar-user-info">
                    <span class="sidebar-user-name">Voters Name</span>
                    <span class="sidebar-user-role">Student Voter</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">MAIN MENU</div>
                <a href="../dashboard.html" class="nav-item"><i class="fas fa-home" style="color: #cbd5e1; width:25px; text-align:center;"></i> Dashboard</a>
                <a href="candidates.html" class="nav-item"><i class="fas fa-users" style="color: #cbd5e1; width:25px; text-align:center;"></i> Candidates</a>
                <a href="results.html" class="nav-item active"><i class="fas fa-chart-bar" style="color: #cbd5e1; width:25px; text-align:center;"></i> Results</a>
                
                <div class="nav-section" style="margin-top: 25px;">ACCOUNT OPTIONS</div>
                <a href="myprofile.html" class="nav-item"><i class="fas fa-user" style="color: #cbd5e1; width:25px; text-align:center;"></i> Profile</a>
                <a href="history.html" class="nav-item"><i class="fas fa-history" style="color: #cbd5e1; width:25px; text-align:center;"></i> Voting History</a>
            </nav>

            <div class="sidebar-footer">
                <a href="../Login.html" class="nav-item logout-btn" onclick="return confirm('Are you sure you want to log out?')"><i class="fas fa-sign-out-alt" style="width:25px; text-align:center;"></i> Logout</a>
            </div>
        </aside>

        <!-- Main Content Wrapper -->
        <div class="main-content">
            <!-- Mobile Header (Visible only on small screens) -->
            <div class="mobile-header">
                <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <span class="portal-name" style="color:#0e0664;">Voting Portal</span>
            </div>

        <div class="container" style="max-width: 1000px;">
            <div id="resultsContent">
                <!-- Filled by JS -->
            </div>
        </div>
        
        <footer class="footer">
            <p>&copy; 2026 Student Voting Portal. All rights reserved.</p>
        </footer>
        </div> <!-- End main-content -->
    </div> <!-- End app-layout -->

        <script src="../js/results.js"></script>
        <script>
            function toggleSidebar() {
                document.getElementById('sidebar').classList.toggle('open');
            }
        </script>
    </body>
    </html>
