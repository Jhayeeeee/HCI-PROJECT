<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Voting System - Candidates</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
    <div class="header">
        <div class="header-left">
            <span class="portal-name">Simple Voting System</span>
        </div>
        <div class="header-right">
            <a href="../dashboard.html" class="nav-button" style="text-decoration:none;">DASHBOARD</a>
            <a href="candidates.html" class="nav-button active" style="text-decoration:none;">CANDIDATES</a>
            
            <div class="profile-dropdown">
                <button class="profile-icon">
                    <img src="https://ui-avatars.com/api/?name=Voters+Name&background=e74c3c&color=fff" alt="Profile">
                </button>
                <div class="dropdown-content">
                    <a href="myprofile.html">Profile</a>
                    <a href="history.html">Voting History</a>
                    <a href="../Login.html" style="color: #e74c3c;"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </div>
            </div>
        </div>
    </div>

    <div class="container" style="max-width: 1000px;">
        <!-- Candidates Section -->
        <div class="candidates-wrapper" id="candidatesSection" style="margin-top: 0; padding-top: 20px; border: none;">
            <div class="section-title" style="display:flex; justify-content:space-between; align-items:center;">
                <div>Official Candidates</div>
                <div id="countdownBanner" style="font-size:0.5em; background:#0055a4; color:#fff; padding:8px 15px; border-radius:20px; font-weight:700;">Loading Timer...</div>
            </div>
            <div class="candidates-grid" id="candidatesGrid">
                <!-- Candidate cards will be injected here by candidates.js -->
            </div>
        </div>
    </div>
    
    <footer class="footer">
        <p>&copy; 2026 Simple Voting System. All rights reserved.</p>
    </footer>

    <script src="../js/candidates.js"></script>
</body>
</html>
