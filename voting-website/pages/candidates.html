    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>e-Voting System - Candidates</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="stylesheet" href="../css/dashboard.css">
    </head>
    <body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="portal-name" style="color:white; font-size: 20px;">Voting Portal</span>
                <button class="close-btn" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="sidebar-user">
                <img src="https://ui-avatars.com/api/?name=Voters+Name&background=e74c3c&color=fff" alt="Profile" class="sidebar-avatar">
                <div class="sidebar-user-info">
                    <span class="sidebar-user-name">Voters Name</span>
                    <span class="sidebar-user-role">Student Voter</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">MAIN MENU</div>
                <a href="../dashboard.html" class="nav-item"><i class="fas fa-home" style="color: #cbd5e1; width:25px; text-align:center;"></i> Dashboard</a>
                <a href="candidates.html" class="nav-item active"><i class="fas fa-users" style="color: #cbd5e1; width:25px; text-align:center;"></i> Candidates</a>
                <a href="results.html" class="nav-item"><i class="fas fa-chart-bar" style="color: #cbd5e1; width:25px; text-align:center;"></i> Results</a>
                
                <div class="nav-section" style="margin-top: 25px;">ACCOUNT OPTIONS</div>
                <a href="myprofile.html" class="nav-item"><i class="fas fa-user" style="color: #cbd5e1; width:25px; text-align:center;"></i> My Profile</a>
                <a href="history.html" class="nav-item"><i class="fas fa-history" style="color: #cbd5e1; width:25px; text-align:center;"></i> Voting History</a>
            </nav>

            <div class="sidebar-footer">
            <a href="../Login.html" class="nav-item logout-btn" onclick="return confirm('Are you sure you want to log out?')"><i class="fas fa-sign-out-alt" style="width:25px; text-align:center;"></i> Logout</a>
        </div>
        </aside>

        <!-- Main Content Wrapper -->
        <div class="main-content">
            <!-- Mobile Header (Visible only on small screens) -->
            <div class="mobile-header">
                <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <span class="portal-name" style="color:#0e0664;">Voting Portal</span>
            </div>
        

        <div class="container" >
            <!-- Candidates Section -->
            <div class="candidates-wrapper" id="candidatesSection" style="margin-top: 0; padding-top: 20px; border: none;">
                <div class="section-title" style="display:flex; justify-content:space-between; align-items:center;">
                    <div class="official-header">Official Candidates</div>
                    <div id="countdownBanner" style="font-size:0.5em; background:#0055a4; color:#fff; padding:8px 15px; border-radius:20px; font-weight:700;">Loading Timer...</div>
                </div>
                <div class="candidates-grid" id="candidatesGrid">
                    <!-- Candidate cards will be injected here by candidates.js -->
                </div>
            </div>
        </div>
        
        <footer class="footer">
            <p>&copy; 2026 e-Voting System. All rights reserved.</p>
        </footer>
        </div> <!-- End main-content -->
    </div> <!-- End app-layout -->

        <!-- Ballot Action Bar -->
        <div id="ballotActionBar" style="display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: #ffffff; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); padding: 15px 20px; text-align: center; z-index: 1000; justify-content: center; gap: 20px;">
            <div style="display: flex; gap: 20px; align-items: center; max-width: 1000px; margin: 0 auto; width: 100%; justify-content: space-between;">
                <div id="ballotProgress" style="font-weight: 700; color: #0055a4; font-size: 1.1em;">
                    Selections: 0 / 0
                </div>
                <div style="display: flex; gap: 15px;">
                    <button onclick="submitBallot()" style="background: #2ecc71; color: white; border: none; padding: 12px 30px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1em; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                        <i class="fas fa-paper-plane"></i> Submit Vote
                    </button>
                    <button onclick="clearBallot()" style="background: #e74c3c; color: white; border: none; padding: 12px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1em; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                        <i class="fas fa-eraser"></i> Clear
                    </button>
                </div>
            </div>
        </div>

        <script src="../js/candidates.js"></script>
        <script>
            function toggleSidebar() {
                document.getElementById('sidebar').classList.toggle('open');
            }
        </script>
    </body>
    </html>
