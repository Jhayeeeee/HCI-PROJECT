<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Voting System - Voting History</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <style>
        .history-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 30px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 5px solid #2ecc71;
            transition: transform 0.2s;
        }
        .history-card:hover { transform: translateX(5px); }
        .history-details h3 { margin: 0 0 5px 0; color: #333; font-size: 1.3em; }
        .history-details p { margin: 0; color: #666; font-size: 0.9em; font-weight: 500; }
        .history-meta {
            text-align: right;
            color: #888;
            font-size: 0.85em;
        }
        .history-meta .badge {
            display: inline-block;
            background: #e8f8f5;
            color: #2ecc71;
            padding: 5px 10px;
            border-radius: 15px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        @media (max-width: 600px) {
            .history-card { flex-direction: column; align-items: flex-start; gap: 15px; }
            .history-meta { text-align: left; }
        }
        .vote-button{
            background-color: #0055a4;
            cursor: pointer;
        }
        .vote-button:hover{
            background-color: #033a66;
        }
    </style>
</head>
<body>
<div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="portal-name" style="color:white;">Voting Portal</span>
            <button class="close-btn" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
        </div>
        
        <div class="sidebar-user">
             <img src="https://ui-avatars.com/api/?name=Voters+Name&background=e74c3c&color=fff" alt="Profile" class="sidebar-avatar">
             <div class="sidebar-user-info">
                 <span class="sidebar-user-name">Voters Name</span>
                 <span class="sidebar-user-role">Student Voter</span>
             </div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section">MAIN MENU</div>
            <a href="../dashboard.html" class="nav-item"><i class="fas fa-home" style="color: #cbd5e1; width:25px; text-align:center;"></i> Dashboard</a>
            <a href="candidates.html" class="nav-item"><i class="fas fa-users" style="color: #cbd5e1; width:25px; text-align:center;"></i> Candidates</a>
            <a href="results.html" class="nav-item"><i class="fas fa-chart-bar" style="color: #cbd5e1; width:25px; text-align:center;"></i> Results</a>
            
            <div class="nav-section" style="margin-top: 25px;">ACCOUNT OPTIONS</div>
            <a href="myprofile.html" class="nav-item"><i class="fas fa-user" style="color: #cbd5e1; width:25px; text-align:center;"></i> My Profile</a>
            <a href="history.html" class="nav-item active"><i class="fas fa-history" style="color: #cbd5e1; width:25px; text-align:center;"></i> Voting History</a>
        </nav>

        <div class="sidebar-footer">
            <a href="../Login.html" class="nav-item logout-btn" onclick="return confirm('Are you sure you want to log out?')"><i class="fas fa-sign-out-alt" style="width:25px; text-align:center;"></i> Logout</a>
        </div>
    </aside>

    <!-- Main Content Wrapper -->
    <div class="main-content">
        <!-- Mobile Header (Visible only on small screens) -->
        <div class="mobile-header">
            <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <span class="portal-name" style="color:#0e0664; font-size: 20px;">Voting Portal</span>
        </div>

    <div class="container" style="max-width: 800px;">
        <div class="section-title" style="margin-top: 30px; margin-bottom: 20px; border-bottom: 3px solid #0055a4; padding-bottom: 15px;">
            <i class="fas fa-history" style="color:#0055a4;"></i> My Voting History
        </div>
        <p style="color: #555; font-size: 1.1em; margin-bottom: 30px;">This page securely logs all the votes you have cast in the current election.</p>
        
        <div id="historyContainer">
        </div>
        
        <div style="margin-top: 40px; text-align: center;">
            <a href="candidates.html" class="vote-button" style="display:inline-block; text-decoration:none; padding: 10px 20px; width:auto; color:white;">Back to Ballot</a>
        </div>
    </div>
    
    <footer class="footer">
        <p>&copy; 2026 e-Voting System. All rights reserved.</p>
    </footer>
    </div> <!-- End main-content -->
</div> <!-- End app-layout -->

    <script>
        // Authentication & Security Heartbeat
        function checkAuthAndStatus() {
            if (localStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = '../Login.html';
                return;
            }
            const status = localStorage.getItem('electionStatus') || 'upcoming';
            if (status === 'closed') {
                localStorage.removeItem('isLoggedIn');
                alert("Voting has formally closed! You are being securely logged out.");
                window.location.href = '../Login.html';
            }
        }

        // Global UI Sync for Sidebar
        function syncSidebarUI() {
            const savedPhoto = localStorage.getItem('myProfilePhoto');
            if (savedPhoto) {
                const avatars = document.querySelectorAll('.sidebar-avatar');
                avatars.forEach(img => {
                    img.src = savedPhoto;
                    img.style.objectFit = 'cover';
                });
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // Initial check
        checkAuthAndStatus();
        setInterval(checkAuthAndStatus, 1000);

        document.addEventListener('DOMContentLoaded', () => {
            syncSidebarUI();
            
            const container = document.getElementById('historyContainer');
            const history = JSON.parse(localStorage.getItem('myVotingHistory') || '[]');
            
            if (history.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center; padding: 50px; background: #fff; border-radius:12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
                        <i class="fas fa-inbox" style="font-size: 3em; color: #bdc3c7; margin-bottom: 20px;"></i>
                        <h3 style="color: #333;">No Voting History</h3>
                        <p style="color: #666;">You haven't cast any votes yet.</p>
                    </div>
                `;
                return;
            }
            
            // Sort by timestamp descending
            history.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            
            let html = '';
            history.forEach(item => {
                html += `
                    <div class="history-card">
                        <div class="history-details" style="display:flex; align-items:center; gap: 20px;">
                            <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(item.name)}&background=random" style="width: 60px; height: 60px; border-radius: 50%;">
                            <div>
                                <h3>${item.name}</h3>
                                <p>${item.position} &bull; ${item.party}</p>
                            </div>
                        </div>
                        <div class="history-meta">
                            <div class="badge"><i class="fas fa-check-circle"></i> VOTE COUNTED</div>
                            <div style="margin-top:5px;"><i class="far fa-clock"></i> ${item.timestamp}</div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        });
    </script>
</body>
</html>
